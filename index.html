<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Arbeitszeit & Auszeit</title>
  <style>
    :root{
      color-scheme: light dark;
      --bg:#f6f7fb; --fg:#0f172a; --card:#fff; --muted:#64748b;
      --accent:#2563eb; --danger:#ef4444; --ok:#16a34a; --track:#e5e7eb; --marker:#0b1221;
      --divider:#facc15; /* gelbe Trennlinie */
      --wash:#cbd5e1; /* Ausgrauen (hell) */
      --shadow:0 6px 18px rgba(0,0,0,.08);
      --workp:60%; --breakp:40%; --elapsedp:0%; --elapsedWorkp:0%;
    }
    @media (prefers-color-scheme: dark){
      :root{ --bg:#0b1221; --fg:#e5e7eb; --card:#0f172a; --track:#1f2937; --marker:#e5e7eb; --wash:#334155; --shadow:none; }
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      padding: env(safe-area-inset-top) 6px env(safe-area-inset-bottom); /* schmale Seitenränder */
      font-family:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg); color:var(--fg);
      display:flex; align-items:center; justify-content:center;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap{ width:100%; max-width:100%; display:grid; gap:12px; } /* volle Breite */
    header{ display:flex; align-items:center; justify-content:space-between; }
    header h1{ margin:0; font-size:1rem; font-weight:800; letter-spacing:.01em; }
    .card{ background:var(--card); border-radius:14px; padding:12px; box-shadow:var(--shadow); }
    .grid{ display:grid; gap:10px; grid-template-columns:1fr 1fr; }
    .group-label{ font-size:.9rem; color:var(--muted); margin-bottom:6px; }
    .stepper{ display:grid; grid-template-columns:72px 1fr 72px; gap:8px; align-items:center; }
    .num{
      text-align:center; font-size:1.8rem; font-weight:800; padding:10px;
      border-radius:12px; border:1px solid #cbd5e1; background:transparent; color:inherit;
      -moz-appearance:textfield;
    }
    .num::-webkit-outer-spin-button,.num::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      min-width:72px; height:60px; border:none; border-radius:12px; font-size:1.8rem; font-weight:900;
      background:#eef2ff; color:#1f2937; cursor:pointer; touch-action:manipulation; user-select:none;
    }
    .btn:active{ transform:scale(.98); }
    .display{ text-align:center; padding:8px 12px; display:grid; gap:10px; }
    .phase{ font-weight:800; letter-spacing:.02em; font-size:.95rem; }
    .time{ font-variant-numeric:tabular-nums; font-size: clamp(2.6rem, 8vw, 4.8rem); font-weight:900; line-height:1.05; }
    .time.work{ color:#dc2626; }
    .time.break{ color:#16a34a; }
    .timeline{
      position:relative; height:28px; border-radius:999px; background:var(--track); overflow:hidden;
    }
    .seg-work,.seg-break{ position:absolute; top:0; bottom:0; z-index:1; }
    .seg-work{ left:0; width:var(--workp); background:rgba(239,68,68,.95); }
    .seg-break{ right:0; width:var(--breakp); background:rgba(22,163,74,.95); }
    .wash{
      position:absolute; left:0; top:0; bottom:0; width:var(--elapsedWorkp);
      background:var(--wash); opacity:0.85; z-index:2; /* „ausgrauen“ */
    }
    .divider{
      position:absolute; top:0; bottom:0; left:var(--workp); width:2px; background:var(--divider);
      z-index:3; pointer-events:none;
    }
    .chips{ display:flex; gap:8px; justify-content:space-between; flex-wrap:wrap; }
    .chip{
      display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px;
      border:1px solid #cbd5e1; font-weight:700; font-variant-numeric:tabular-nums; font-size:.95rem;
    }
    .toolbar{ display:flex; gap:10px; justify-content:center; }
    .icon-btn{
      width:64px; height:64px; border-radius:14px; font-size:1.8rem; display:inline-flex;
      align-items:center; justify-content:center; border:none; cursor:pointer; touch-action:manipulation;
    }
    .icon-btn.primary{ background:var(--accent); color:#fff; }
    .icon-btn.danger{ background:var(--danger); color:#fff; }
    .icon-btn.ghost{ background:transparent; border:1px solid #cbd5e1; color:inherit; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Arbeitszeit & Auszeit</h1>
      <button id="soundBtn" class="icon-btn ghost" aria-label="Ton an/aus">🔊</button>
    </header>

    <div class="card">
      <div class="grid">
        <div>
          <div class="group-label">Σ Gesamt (Min)</div>
          <div class="stepper">
            <button id="totalMinus" class="btn" aria-label="Gesamtzeit −1">−</button>
            <input id="total" class="num" type="number" min="1" step="1" value="45" inputmode="numeric" />
            <button id="totalPlus" class="btn" aria-label="Gesamtzeit +1">+</button>
          </div>
        </div>
        <div>
          <div class="group-label">📱 Auszeit (Min)</div>
          <div class="stepper">
            <button id="breakMinus" class="btn" aria-label="Auszeit −1">−</button>
            <input id="break" class="num" type="number" min="0" step="1" value="10" inputmode="numeric" />
            <button id="breakPlus" class="btn" aria-label="Auszeit +1">+</button>
          </div>
        </div>
      </div>
      <div class="chips" style="margin-top:8px;">
        <div class="chip" title="Arbeitszeit">🟥 <span id="workChip">35:00</span></div>
        <div class="chip" title="Auszeit">📱 <span id="breakChip">10:00</span></div>
        <div class="chip" title="Gesamt">Σ <span id="totalChip">45:00</span></div>
      </div>
    </div>

    <div class="card display">
      <div id="phaseLabel" class="phase">Arbeitszeit</div>
      <div id="phaseTime" class="time work">35:00</div>
      <div class="timeline" aria-label="Zeitbalken">
        <div class="seg-work"><div class="wash"></div></div>
        <div class="seg-break"></div>
        <div class="divider" title="Trennlinie"></div>
      </div>
      <div class="toolbar">
        <button id="startPauseBtn" class="icon-btn primary" aria-label="Start/Pause">▶</button>
        <button id="resetBtn" class="icon-btn danger" aria-label="Reset">⟲</button>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // Inputs
    const totalInput = $('total');
    const breakInput = $('break');
    const totalMinus = $('totalMinus');
    const totalPlus = $('totalPlus');
    const breakMinus = $('breakMinus');
    const breakPlus = $('breakPlus');

    // Chips & display
    const workChip = $('workChip');
    const breakChip = $('breakChip');
    const totalChip = $('totalChip');
    const phaseLabel = $('phaseLabel');
    const phaseTime = $('phaseTime');
    const startPauseBtn = $('startPauseBtn');
    const resetBtn = $('resetBtn');
    const soundBtn = $('soundBtn');

    // Persisted settings
    let soundOn = true;
    try{
      const saved = JSON.parse(localStorage.getItem('coupledTimerSettingsV4')||'{}');
      if(Number.isFinite(saved.totalMin)) totalInput.value = saved.totalMin;
      if(Number.isFinite(saved.breakMin)) breakInput.value = saved.breakMin;
      if(typeof saved.soundOn === 'boolean') soundOn = saved.soundOn;
    }catch{}
    updateSoundIcon();

    const state = {
      totalSec: Math.max(60,(parseInt(totalInput.value,10)||45)*60),
      breakSec: Math.max(0,(parseInt(breakInput.value,10)||10)*60),
      workSec: 0,
      started:false, running:false,
      t0:0, pausedAcc:0, pauseStart:0,
      lastPhase:'work'
    };

    // Audio
    let audioCtx=null;
    function ensureAudio(){ if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch{} } }
    function beep(ms=180, freq=700){
      if(!soundOn || !audioCtx) return;
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(0.0001,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.22,audioCtx.currentTime+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+ms/1000);
      o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+ms/1000+0.02);
    }
    function updateSoundIcon(){ soundBtn.textContent = soundOn ? '🔊' : '🔈'; }

    // Utils
    const clamp=(n,min,max)=>Math.max(min,Math.min(max,n));
    function fmt(s){ s=Math.max(0,Math.floor(s)); const m=Math.floor(s/60),sec=s%60; return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}
    function save(){
      localStorage.setItem('coupledTimerSettingsV4', JSON.stringify({
        totalMin: Math.floor(state.totalSec/60),
        breakMin: Math.floor(state.breakSec/60),
        soundOn
      }));
    }

    // Timing helpers
    function currentElapsed(){
      if(!state.started) return 0;
      const now=Date.now();
      const paused = state.running ? state.pausedAcc : (state.pausedAcc + (state.pauseStart ? (now - state.pauseStart) : 0));
      const e = Math.floor((now - state.t0 - paused)/1000);
      return clamp(e,0,state.totalSec);
    }
    function getPhase(elapsed){
      if(elapsed < state.workSec) return 'work';
      if(elapsed < state.totalSec) return 'break';
      return 'done';
    }

    // Recalc from inputs
    function recalc(){
      const beforeStarted = !state.started;
      let totalMin = parseInt(totalInput.value,10)||1;
      totalMin = clamp(totalMin,1,24*60);
      if(beforeStarted){ state.totalSec = totalMin*60; totalInput.value = totalMin; }
      let breakMin = parseInt(breakInput.value,10)||0;
      const limit = beforeStarted ? totalMin : Math.floor(state.totalSec/60);
      breakMin = clamp(breakMin, 0, limit);
      breakInput.value = breakMin;

      state.breakSec = breakMin*60;
      state.workSec = clamp(state.totalSec - state.breakSec, 0, state.totalSec);

      workChip.textContent = fmt(state.workSec);
      breakChip.textContent = fmt(state.breakSec);
      totalChip.textContent = fmt(state.totalSec);

      const elapsed = currentElapsed();
      const phase = getPhase(elapsed);
      if(phase !== state.lastPhase){
        beep(150, phase==='break' ? 600 : 700);
        state.lastPhase = phase;
      }

      updateUI(true);
      save();
    }

    // UI update
    function updateUI(skipBeep=false){
      const elapsed = currentElapsed();
      const phase = getPhase(elapsed);

      let remainPhase = 0;
      if(phase==='work'){ phaseLabel.textContent='Arbeitszeit'; phaseTime.className='time work'; remainPhase = state.workSec - elapsed; }
      else if(phase==='break'){ phaseLabel.textContent='Auszeit'; phaseTime.className='time break'; remainPhase = state.totalSec - elapsed; }
      else { phaseLabel.textContent='Fertig'; phaseTime.className='time'; remainPhase=0; }
      phaseTime.textContent = fmt(remainPhase);

      // Balken und Ausgrauen
      const workp = state.totalSec ? (state.workSec/state.totalSec)*100 : 0;
      const breakp = 100 - workp;
      const elapsedp = state.totalSec ? (elapsed/state.totalSec)*100 : 0;
      const elapsedWorkp = Math.min(elapsedp, workp);
      document.documentElement.style.setProperty('--workp', `${workp}%`);
      document.documentElement.style.setProperty('--breakp', `${breakp}%`);
      document.documentElement.style.setProperty('--elapsedp', `${elapsedp}%`);
      document.documentElement.style.setProperty('--elapsedWorkp', `${elapsedWorkp}%`);

      // Controls
      startPauseBtn.textContent = state.running ? '⏸' : '▶';
      const locked = state.started;
      totalInput.disabled = locked; totalMinus.disabled = locked; totalPlus.disabled = locked;
    }

    // Start/Pause/Reset
    let ticker=null;
    function start(){
      ensureAudio();
      if(!state.started){
        state.started = true;
        state.t0 = Date.now();
        state.pausedAcc = 0;
        state.lastPhase = 'work';
      }else if(!state.running){
        if(state.pauseStart){
          state.pausedAcc += Date.now() - state.pauseStart;
          state.pauseStart = 0;
        }
      }
      if(!state.running){
        state.running = true;
        if(ticker) clearInterval(ticker);
        ticker = setInterval(tick, 200);
      }
      updateUI(true);
    }
    function pause(){
      if(!state.running) return;
      state.running = false;
      state.pauseStart = Date.now();
      if(ticker) clearInterval(ticker);
      ticker=null;
      updateUI(true);
    }
    function reset(){
      state.started=false; state.running=false;
      state.t0=0; state.pausedAcc=0; state.pauseStart=0;
      if(ticker) clearInterval(ticker); ticker=null;
      recalc();
      updateUI(true);
    }
    function tick(){
      const elapsed = currentElapsed();
      const phase = getPhase(elapsed);
      if(phase !== state.lastPhase){
        beep(180, phase==='break' ? 600 : 700);
        state.lastPhase = phase;
      }
      if(phase==='done'){
        updateUI();
        beep(400,760);
        clearInterval(ticker); ticker=null;
        state.running=false;
        return;
      }
      updateUI();
    }

    // Button repeat (press-and-hold)
    function addRepeater(button, stepFn){
      let holdTimer=null, repeatTimer=null;
      const startHold = (e)=>{
        e.preventDefault();
        stepFn();
        holdTimer = setTimeout(()=>{ repeatTimer = setInterval(stepFn, 120); }, 400);
      };
      const endHold = ()=>{
        clearTimeout(holdTimer); clearInterval(repeatTimer);
        holdTimer=null; repeatTimer=null;
      };
      button.addEventListener('pointerdown', startHold);
      window.addEventListener('pointerup', endHold);
      window.addEventListener('pointercancel', endHold);
      window.addEventListener('blur', endHold);
    }

    // Steps
    function stepTotal(delta){
      if(state.started) return;
      const v = clamp((parseInt(totalInput.value,10)||1)+delta, 1, 24*60);
      totalInput.value = v; recalc();
    }
    function stepBreak(delta){
      const limit = state.started ? Math.floor(state.totalSec/60) : (parseInt(totalInput.value,10)||1);
      const v = clamp((parseInt(breakInput.value,10)||0)+delta, 0, limit);
      breakInput.value = v; recalc();
    }

    // Wiring
    startPauseBtn.addEventListener('click', ()=> state.running ? pause() : start());
    resetBtn.addEventListener('click', reset);
    totalInput.addEventListener('input', ()=>{ if(!state.started) recalc(); });
    breakInput.addEventListener('input', ()=>{ recalc(); });
    soundBtn.addEventListener('click', ()=>{ ensureAudio(); soundOn = !soundOn; updateSoundIcon(); save(); });

    // Repeaters + taps
    addRepeater(totalMinus, ()=>stepTotal(-1));
    addRepeater(totalPlus,  ()=>stepTotal(+1));
    addRepeater(breakMinus, ()=>stepBreak(-1));
    addRepeater(breakPlus,  ()=>stepBreak(+1));

    // Init
    recalc(); updateUI(true);
  </script>
</body>
</html>
